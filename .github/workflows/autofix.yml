name: Autofix Repo Standards

on:
  push:
    branches:
      - main
    paths:
      - "main.py"
      - "README.md"
      - "Makefile"
      - "scripts/**"
      - "website/docs/**"
      - "website/src/**"
      - "website/static/**"
      - "website/package.json"
      - "website/package-lock.json"
      - "website/docusaurus.config.ts"
      - "website/sidebars.ts"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autofix-main
  cancel-in-progress: true

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Run autofix loop
        run: make fix

      - name: Create autofix pull request
        id: create_autofix_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: apply repo autofix loop"
          branch: "automation/repo-autofix"
          delete-branch: true
          title: "chore: apply repo autofix loop"
          body: |
            ## Summary

            This pull request was created automatically by the repo autofix workflow.

            It applies the standard repo loop:

            - regenerate machine-readable artifacts
            - normalize Python and docs formatting
            - re-run the generation step after formatting
            - leave the repository in a validation-clean state

            ## Notes

            - Generated by `.github/workflows/autofix.yml`
            - Validation remains in `.github/workflows/ci.yml`
          labels: |
            automation
            housekeeping

      - name: Report autofix PR result
        if: steps.create_autofix_pr.outcome == 'failure'
        run: |
          echo "Autofix changes were generated, but GitHub Actions could not create a PR."
          echo "Enable Actions PR creation permissions or create a PR from automation/repo-autofix manually."