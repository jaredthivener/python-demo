name: Deploy Docs to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      confirm_production_deploy:
        description: "Type YES to deploy docs to production"
        required: true
        default: "NO"

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs if a new one is pushed
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Docusaurus site
    runs-on: ubuntu-latest
    env:
      # Workaround: actions/upload-pages-artifact@v4 internally pins upload-artifact@v4.6.2 (Node 20).
      # Remove once https://github.com/actions/upload-pages-artifact/issues/138 is resolved.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_production_deploy == 'YES'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
